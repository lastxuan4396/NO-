services:
  - type: web
    name: nvc-couple-links
    runtime: node
    plan: free
    region: oregon
    buildCommand: npm ci
    startCommand: npm run start:prod
    envVars:
      - key: NODE_VERSION
        value: "20"
      - key: SHORTLINK_STORAGE
        value: postgres
      - key: SHORTLINK_TTL_DAYS
        value: "30"
      - key: SHORTLINK_CLEANUP_INTERVAL_MS
        value: "600000"
      - key: RATE_LIMIT_WINDOW_MS
        value: "60000"
      - key: RATE_LIMIT_WRITE_MAX
        value: "40"
      - key: RATE_LIMIT_READ_MAX
        value: "160"
      - key: DATABASE_SSL
        value: "false"
      - key: CORS_ALLOW_ORIGINS
        value: https://nvc-couple-share.onrender.com
      - key: PUBLIC_BASE_URL
        value: https://nvc-couple-share.onrender.com
      - key: TURNSTILE_SECRET_KEY
        sync: false
      - key: SHORTLINK_PIN_SECRET
        sync: false
      - key: SENTRY_DSN
        sync: false
      - key: DATABASE_URL
        fromDatabase:
          name: nvc-shortlinks-db
          property: connectionString

  - type: web
    name: nvc-couple-share
    runtime: static
    buildCommand: npm ci && npm run build:config
    staticPublishPath: public
    envVars:
      - key: NVC_API_BASE
        value: https://nvc-couple-links.onrender.com
      - key: NVC_TURNSTILE_SITE_KEY
        value: ""
    routes:
      - type: rewrite
        source: /*
        destination: /index.html

databases:
  - name: nvc-shortlinks-db
    databaseName: nvc_shortlinks_db
    databaseUser: nvc_shortlinks_db_user
    ipAllowList: []
    plan: free
    postgresMajorVersion: "16"
    region: oregon
